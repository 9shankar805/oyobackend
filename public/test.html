<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #E60023; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .response { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>HOTELSEWA API Test</h1>
    
    <button onclick="testHotels()">Test Hotels API</button>
    <div id="hotels-result" class="response"></div>
    
    <button onclick="testUsers()">Test Users API</button>
    <div id="users-result" class="response"></div>
    
    <button onclick="testRegister()">Test Register</button>
    <div id="register-result" class="response"></div>

    <script>
        function testHotels() {
            document.getElementById('hotels-result').innerHTML = 'Loading...';
            
            fetch('/api/hotels')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hotels-result').innerHTML = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    document.getElementById('hotels-result').innerHTML = 'Error: ' + error.message;
                });
        }
        
        function testUsers() {
            document.getElementById('users-result').innerHTML = 'Loading...';
            
            fetch('/api/users')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('users-result').innerHTML = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    document.getElementById('users-result').innerHTML = 'Error: ' + error.message;
                });
        }
        
        function testRegister() {
            document.getElementById('register-result').innerHTML = 'Loading...';
            
            fetch('/api/users/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: 'Test User',
                    email: 'test@example.com',
                    phone: '1234567890'
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('register-result').innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('register-result').innerHTML = 'Error: ' + error.message;
            });
        }
    </script>
</body>
</html>
